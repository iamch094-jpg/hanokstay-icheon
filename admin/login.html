<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 · 한옥스테이 더 이천</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#2B2B28; --hanji:#F4EEDF; --dancheong:#9B3327; --line:rgba(43,43,40,0.16); }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Noto Sans KR', sans-serif; background:var(--hanji); color:var(--ink);
    min-height:100vh; display:flex; align-items:center; justify-content:center; font-weight:300;
  }
  .card{ width:100%; max-width:360px; padding:44px 36px; border:1px solid var(--line); background:#fff; }
  h1{ font-family:'Noto Serif KR', serif; font-size:20px; font-weight:700; margin-bottom:8px; }
  p.sub{ font-size:13.5px; color:#5C5B54; margin-bottom:32px; }
  label{ display:block; font-size:12.5px; letter-spacing:0.04em; color:var(--dancheong); margin-bottom:8px; }
  input{
    width:100%; padding:12px 14px; margin-bottom:20px; font-size:14.5px;
    border:1px solid var(--line); background:var(--hanji); font-family:'Noto Sans KR', sans-serif;
  }
  input:focus{ outline:1px solid var(--dancheong); }
  button{
    width:100%; padding:13px; background:var(--ink); color:#fff; border:none;
    font-size:14.5px; letter-spacing:0.02em; cursor:pointer; margin-top:6px;
  }
  button:hover{ opacity:0.88; }
  .error{ color:var(--dancheong); font-size:13px; margin-top:14px; display:none; }
  a.back{ display:block; text-align:center; margin-top:24px; font-size:12.5px; color:#5C5B54; text-decoration:none; }
</style>
</head>
<body>
  <div class="card">
    <h1>관리자 로그인</h1>
    <p class="sub">한옥스테이 더 이천 홈페이지 내용을 수정할 수 있어요.</p>
    <form id="loginForm">
      <label for="uid">아이디</label>
      <input type="text" id="uid" autocomplete="username">
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" autocomplete="current-password">
      <button type="submit">로그인</button>
      <div class="error" id="err">아이디 또는 비밀번호가 올바르지 않아요.</div>
    </form>
    <a class="back" href="../index.html">← 홈페이지로 돌아가기</a>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      var uid = document.getElementById('uid').value.trim();
      var pw = document.getElementById('pw').value.trim();
      if(uid === '1234' && pw === '4321'){
        sessionStorage.setItem('hanokAdminAuthed', '1');
        window.location.href = 'edit.html';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    });
  </script>
</body>
</html>
