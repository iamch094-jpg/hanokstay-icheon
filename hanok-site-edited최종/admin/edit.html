<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내용 수정 · 한옥스테이 더 이천</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#2B2B28; --ink-soft:#5C5B54; --hanji:#F4EEDF; --dancheong:#9B3327; --line:rgba(43,43,40,0.16); --pine:#3E5641; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Noto Sans KR', sans-serif; background:var(--hanji); color:var(--ink); font-weight:300; }
  .topbar{ display:flex; justify-content:space-between; align-items:center; padding:22px 40px; border-bottom:1px solid var(--line); background:#fff; }
  .topbar h1{ font-family:'Noto Serif KR', serif; font-size:17px; font-weight:700; }
  .topbar button{ background:none; border:1px solid var(--line); padding:8px 16px; font-size:13px; cursor:pointer; color:var(--ink-soft); }
  .wrap{ max-width:720px; margin:0 auto; padding:44px 32px 100px; }
  .notice{ background:#fff; border:1px solid var(--line); border-left:4px solid var(--dancheong); padding:18px 20px; font-size:13.5px; color:var(--ink-soft); margin-bottom:36px; line-height:1.7; }
  fieldset{ border:none; margin-bottom:36px; }
  legend{ font-family:'Noto Serif KR', serif; font-weight:700; font-size:15px; margin-bottom:16px; color:var(--pine); }
  .row{ margin-bottom:18px; }
  .row.two{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  label{ display:block; font-size:12.5px; letter-spacing:0.03em; color:var(--dancheong); margin-bottom:7px; }
  input, textarea{
    width:100%; padding:11px 13px; font-size:14px; border:1px solid var(--line);
    background:#fff; font-family:'Noto Sans KR', sans-serif; color:var(--ink);
  }
  textarea{ min-height:90px; resize:vertical; line-height:1.7; }
  input:focus, textarea:focus{ outline:1px solid var(--dancheong); }
  .actions{ position:sticky; bottom:0; background:var(--hanji); padding:20px 0; border-top:1px solid var(--line); display:flex; gap:12px; flex-wrap:wrap; }
  button.primary{ background:var(--ink); color:#fff; border:none; padding:14px 26px; font-size:14px; cursor:pointer; }
  button.secondary{ background:transparent; color:var(--ink); border:1px solid var(--line); padding:14px 22px; font-size:14px; cursor:pointer; }
  button:hover{ opacity:0.88; }
  #status{ font-size:13px; margin-top:14px; color:var(--pine); display:none; }
  .banner-item{ background:#fff; border:1px solid var(--line); padding:18px; margin-bottom:14px; }
  .banner-item .row.two{ grid-template-columns:1fr 1fr 1fr; }
  .banner-item-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .banner-item-head span{ font-size:13px; font-weight:500; color:var(--ink); }
  .banner-item-head button{ background:none; border:none; color:var(--dancheong); font-size:12.5px; cursor:pointer; }
  .chk-row{ display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:13px; }
  .chk-row input{ width:auto; }
</style>
</head>
<body>

<div class="topbar">
  <h1>한옥스테이 더 이천 · 내용 수정</h1>
  <button onclick="logout()">로그아웃</button>
</div>

<div class="wrap">
  <div class="notice">
    이 페이지는 정적 사이트용 간이 편집기예요. <b>"이 브라우저에서 미리보기"</b>는 지금 쓰는 브라우저에서만 바로 반영되고,
    실제로 사이트를 보는 모든 방문자에게 반영하려면 <b>"수정된 index.html 다운로드"</b>로 파일을 받아
    기존 파일을 덮어써서 Netlify에 다시 드래그해 올려야 해요. (사진 파일은 그대로 두고 index.html만 교체하면 돼요.)
  </div>

  <form id="editForm">
    <fieldset>
      <legend>기본 정보</legend>
      <div class="row"><label>숙소명</label><input id="title" type="text"></div>
      <div class="row"><label>한줄소개 (메인 화면 문구)</label><input id="lead" type="text"></div>
      <div class="row"><label>상세소개</label><textarea id="intro"></textarea></div>
    </fieldset>

    <fieldset>
      <legend>운영 정보</legend>
      <div class="row two">
        <div><label>체크인</label><input id="checkin" type="text"></div>
        <div><label>체크아웃</label><input id="checkout" type="text"></div>
      </div>
      <div class="row two">
        <div><label>기준/최대 인원 (간략 표기)</label><input id="capacity" type="text"></div>
        <div><label>기준/최대 인원 (상세 표기)</label><input id="roomCapacity" type="text"></div>
      </div>
      <div class="row"><label>대표자</label><input id="host" type="text"></div>
      <div class="row"><label>대표전화</label><input id="phone" type="text"></div>
      <div class="row"><label>주소</label><input id="address" type="text"></div>
      <div class="row"><label>사업자등록번호</label><input id="bizno" type="text"></div>
    </fieldset>

    <fieldset>
      <legend>객실 정보</legend>
      <div class="row"><label>객실 설명</label><input id="roomDesc" type="text"></div>
    </fieldset>

    <fieldset>
      <legend>예약</legend>
      <div class="row"><label>예약 페이지 URL</label><input id="bookingUrl" type="text"></div>
    </fieldset>

    <fieldset>
      <legend>상단 배너 관리</legend>
      <p style="font-size:12.5px; color:var(--ink-soft); margin-bottom:16px;">
        추가한 배너는 홈페이지 위에 떠 있는 팝업 형태로 노출돼요.
      </p>
      <div id="bannerList"></div>
      <button type="button" class="secondary" onclick="addBanner()" style="margin-top:6px;">+ 배너 추가</button>
    </fieldset>

    <div class="actions">
      <button type="button" class="secondary" onclick="previewSave()">이 브라우저에서 미리보기</button>
      <button type="button" class="primary" onclick="downloadUpdated()">수정된 index.html 다운로드</button>
    </div>
    <div id="status"></div>
  </form>
</div>

<script>
  if(sessionStorage.getItem('hanokAdminAuthed') !== '1'){
    window.location.href = 'login.html';
  }
  function logout(){
    sessionStorage.removeItem('hanokAdminAuthed');
    window.location.href = 'login.html';
  }

  var defaults = {
    title:'한옥스테이 더 이천',
    lead:'프라이빗 한옥 스테이에서 편안한 쉼을 느껴보세요.',
    intro:'기와지붕과 마당을 그대로 품은 독채 한옥. 실외 바베큐장을 갖춘 프라이빗 공간에서, 도심에서 한 걸음 물러난 하루를 보낼 수 있습니다.',
    checkin:'15:00', checkout:'11:00',
    capacity:'4인 / 8인', roomCapacity:'기준 4인 / 최대 8인',
    host:'추승규', phone:'010-6676-7732', address:'경기 이천시 대포동 329',
    bizno:'704-15-02517', roomDesc:'실외 바베큐장 비치',
    bookingUrl:'https://booking.ddnayo.com/?accommodationId=106558'
  };

  var saved = {};
  try{ saved = JSON.parse(localStorage.getItem('hanokSiteContent') || '{}'); }catch(e){}
  var data = Object.assign({}, defaults, saved);
  Object.keys(defaults).forEach(function(key){
    var el = document.getElementById(key);
    if(!el) return;
    if(el.type === 'checkbox') el.checked = !!data[key];
    else el.value = data[key];
  });

  function collect(){
    var d = {};
    Object.keys(defaults).forEach(function(key){
      var el = document.getElementById(key);
      if(!el){ d[key] = defaults[key]; return; }
      d[key] = el.type === 'checkbox' ? el.checked : el.value;
    });
    return d;
  }

  var bannersData = [];
  var THEME_OPTIONS = [
    {v:'dancheong', l:'다홍(기본)'},
    {v:'naver', l:'네이버 그린'},
    {v:'pine', l:'소나무 그린'}
  ];
  var DEFAULT_IMAGE_OPTIONS = [
    {v:'', l:'이미지 없음'},
    {v:'banner-pool.svg', l:'기본 이미지 · 수영장'},
    {v:'banner-barbecue.svg', l:'기본 이미지 · 바비큐'},
    {v:'banner-landscape.svg', l:'기본 이미지 · 풍경'},
    {v:'banner-opening.svg', l:'기본 이미지 · 오픈 이벤트'}
  ];
  var BANNER_SIZE_OPTIONS = [
    {v:'small', l:'작은 사이즈'},
    {v:'medium', l:'중간 사이즈'},
    {v:'large', l:'큰 사이즈'}
  ];

  function bannerItemHtml(b, idx){
    var themeOpts = THEME_OPTIONS.map(function(t){
      return '<option value="' + t.v + '"' + (b.theme === t.v ? ' selected' : '') + '>' + t.l + '</option>';
    }).join('');
    var imageOpts = DEFAULT_IMAGE_OPTIONS.map(function(i){
      return '<option value="' + i.v + '"' + ((b.image || '') === i.v ? ' selected' : '') + '>' + i.l + '</option>';
    }).join('');
    var sizeOpts = BANNER_SIZE_OPTIONS.map(function(s){
      return '<option value="' + s.v + '"' + ((b.size || 'medium') === s.v ? ' selected' : '') + '>' + s.l + '</option>';
    }).join('');
    return (
      '<div class="banner-item" data-idx="' + idx + '">' +
        '<div class="banner-item-head">' +
          '<span>배너 ' + (idx + 1) + '</span>' +
          '<button type="button" data-action="remove">삭제</button>' +
        '</div>' +
        '<div class="chk-row"><input type="checkbox" data-field="enabled"' + (b.enabled ? ' checked' : '') + '> 이 배너 사용</div>' +
        '<div class="chk-row"><input type="checkbox" data-field="showCta"' + (b.showCta === false ? '' : ' checked') + '> 자세히 보기 버튼 노출</div>' +
        '<div class="row"><label>배너 문구</label><input type="text" data-field="text" value="' + (b.text || '').replace(/"/g,'&quot;') + '" placeholder="예: 7월 한정 얼리버드 10% 할인"></div>' +
        '<div class="row two">' +
          '<div><label>이동 링크</label><input type="text" data-field="link" value="' + (b.link || '').replace(/"/g,'&quot;') + '"></div>' +
          '<div><label>버튼 문구</label><input type="text" data-field="ctaLabel" value="' + (b.ctaLabel || '자세히보기').replace(/"/g,'&quot;') + '"></div>' +
          '<div><label>색상 테마</label><select data-field="theme">' + themeOpts + '</select></div>' +
        '</div>' +
        '<div class="row"><label>배너 크기</label><select data-field="size">' + sizeOpts + '</select></div>' +
        '<div class="row"><label>기본 배너 이미지</label><select data-field="image">' + imageOpts + '</select></div>' +
      '</div>'
    );
  }

  function renderBannerList(){
    document.getElementById('bannerList').innerHTML = bannersData.map(bannerItemHtml).join('');
  }

  document.getElementById('bannerList').addEventListener('input', function(e){
    var item = e.target.closest('.banner-item');
    if(!item) return;
    var idx = parseInt(item.dataset.idx, 10);
    var field = e.target.dataset.field;
    if(!field) return;
    bannersData[idx][field] = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
  });
  document.getElementById('bannerList').addEventListener('change', function(e){
    var item = e.target.closest('.banner-item');
    if(!item) return;
    var idx = parseInt(item.dataset.idx, 10);
    var field = e.target.dataset.field;
    if(!field) return;
    bannersData[idx][field] = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
  });
  document.getElementById('bannerList').addEventListener('click', function(e){
    if(e.target.dataset.action === 'remove'){
      var item = e.target.closest('.banner-item');
      var idx = parseInt(item.dataset.idx, 10);
      bannersData.splice(idx, 1);
      renderBannerList();
    }
  });

  function addBanner(){
    bannersData.push({ id:'banner_' + Date.now(), enabled:true, showCta:true, size:'medium', theme:'dancheong', text:'', link:'', ctaLabel:'자세히보기', image:'' });
    renderBannerList();
  }

  var FALLBACK_BANNERS = [];

  function loadBanners(){
    try{
      var raw = localStorage.getItem('hanokBanners');
      if(raw){ bannersData = JSON.parse(raw); renderBannerList(); return; }
    }catch(e){}
    fetch('../index.html').then(function(res){ return res.text(); }).then(function(html){
      var m = html.match(/\/\*BANNERS_START\*\/([\s\S]*?)\/\*BANNERS_END\*\//);
      if(m){
        try{ bannersData = JSON.parse(m[1]); }catch(e){ bannersData = FALLBACK_BANNERS.slice(); }
      } else {
        bannersData = FALLBACK_BANNERS.slice();
      }
      renderBannerList();
    }).catch(function(){
      bannersData = FALLBACK_BANNERS.slice();
      renderBannerList();
    });
  }
  loadBanners();

  function showStatus(msg){
    var s = document.getElementById('status');
    s.textContent = msg;
    s.style.display = 'block';
  }

  function previewSave(){
    var d = collect();
    localStorage.setItem('hanokSiteContent', JSON.stringify(d));
    localStorage.setItem('hanokBanners', JSON.stringify(bannersData));
    showStatus('저장했어요. index.html을 새로고침하면 이 브라우저에서 바로 확인할 수 있어요.');
  }

  function replaceById(html, id, value){
    var re = new RegExp('(id="' + id + '"[^>]*>)([^<]*)(<)');
    return html.replace(re, function(m, p1, p2, p3){ return p1 + value + p3; });
  }
  function replaceByClass(html, cls, value){
    var re = new RegExp('(class="[^"]*\\b' + cls + '\\b[^"]*"[^>]*>)([^<]*)(<)', 'g');
    return html.replace(re, function(m, p1, p2, p3){ return p1 + value + p3; });
  }
  function replaceHrefByClass(html, cls, value){
    var re = new RegExp('(href=")([^"]*)("[^>]*class="[^"]*' + cls + '[^"]*")', 'g');
    return html.replace(re, function(m, p1, p2, p3){ return p1 + value + p3; });
  }

  function downloadUpdated(){
    var d = collect();
    localStorage.setItem('hanokSiteContent', JSON.stringify(d));
    fetch('../index.html').then(function(res){
      if(!res.ok) throw new Error('index.html을 불러오지 못했어요');
      return res.text();
    }).then(function(html){
      ['f-title','f-title-hero','f-title-room','f-title-foot','f-title-meta'].forEach(function(id){
        html = replaceById(html, id, d.title);
      });
      html = replaceById(html, 'f-lead', d.lead);
      html = replaceById(html, 'f-intro', d.intro);
      html = replaceByClass(html, 'f-checkin', d.checkin);
      html = replaceByClass(html, 'f-checkout', d.checkout);
      html = replaceByClass(html, 'f-capacity', d.capacity);
      html = replaceByClass(html, 'f-room-capacity', d.roomCapacity);
      html = replaceByClass(html, 'f-host', d.host);
      html = replaceByClass(html, 'f-phone', d.phone);
      html = replaceByClass(html, 'f-address', d.address);
      html = replaceByClass(html, 'f-bizno', d.bizno);
      html = replaceByClass(html, 'f-room-desc', d.roomDesc);
      html = replaceHrefByClass(html, 'f-booking-url', d.bookingUrl);

      // 배너 배열 전체를 새 값으로 교체
      html = html.replace(/\/\*BANNERS_START\*\/[\s\S]*?\/\*BANNERS_END\*\//,
        '/*BANNERS_START*/' + JSON.stringify(bannersData) + '/*BANNERS_END*/');

      var blob = new Blob([html], {type:'text/html'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      document.body.appendChild(a);
      a.click();
      a.remove();
      showStatus('index.html 파일을 다운로드했어요. 기존 index.html을 이 파일로 교체한 뒤 Netlify에 다시 올려주세요.');
    }).catch(function(err){
      showStatus('자동 다운로드에 실패했어요 (' + err.message + '). Netlify에 배포한 실제 주소에서 다시 시도해보세요.');
    });
  }
</script>

</body>
</html>
